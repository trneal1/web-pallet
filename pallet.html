<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>WebSocket JSON Drawing Viewer</title>
  <link rel="stylesheet" href="https://unpkg.com/@xterm/xterm@5.5.0/css/xterm.css" />
  <style>
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: #111827;
      color: white;
      display: grid;
      grid-template-rows: auto 1fr;
      height: 100vh;
    }

    header {
      display: flex;
      gap: 0.75rem;
      align-items: center;
      padding: 0.75rem;
      background: #1f2937;
      border-bottom: 1px solid #374151;
    }

    input,
    select {
      flex: 1;
      padding: 0.5rem 0.65rem;
      border-radius: 0.5rem;
      border: 1px solid #4b5563;
      background: #111827;
      color: white;
    }

    #pageSelect {
      flex: 0 0 9rem;
    }

    #deletePage {
      background: #4b5563;
    }

    #deletePage:disabled {
      cursor: not-allowed;
      opacity: 0.45;
    }

    button {
      padding: 0.5rem 0.8rem;
      border: 0;
      border-radius: 0.5rem;
      cursor: pointer;
      background: #2563eb;
      color: white;
      font-weight: 600;
    }

    #status {
      min-width: 8rem;
      font-size: 0.9rem;
      color: #d1d5db;
    }

    main {
      overflow: hidden;
      position: relative;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      background: white;
    }

    #terminalLayer {
      inset: 0;
      pointer-events: none;
      position: absolute;
    }

    #uiLayer {
      inset: 0;
      pointer-events: none;
      position: absolute;
    }

    #chartLayer {
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      position: absolute;
    }

    .chart-region {
      background: white;
      border: 1px solid #cbd5e1;
      border-radius: 0.75rem;
      box-shadow: 0 4px 18px rgba(15, 23, 42, 0.13);
      min-height: 32px;
      min-width: 32px;
      overflow: hidden;
      pointer-events: auto;
      position: absolute;
    }

    .chart-region.hidden { display: none; }

    .chart-region.in-card {
      left: auto !important;
      position: relative;
      top: auto !important;
      width: 100% !important;
    }

    .chart-titlebar {
      align-items: center;
      background: rgba(15, 23, 42, 0.88);
      color: #f8fafc;
      display: none;
      font-size: 0.82rem;
      font-weight: 700;
      height: 2rem;
      inset: 0 0 auto;
      padding: 0 0.65rem;
      position: absolute;
      z-index: 2;
    }

    .chart-region.show-titlebar .chart-titlebar { display: flex; }

    .chart-canvas {
      height: 100%;
      inset: 0;
      position: absolute;
      width: 100%;
    }

    .chart-region.show-titlebar .chart-canvas {
      height: calc(100% - 2rem);
      top: 2rem;
    }

    .pallet-grid {
      box-sizing: border-box;
      display: grid;
      overflow: auto;
      pointer-events: none;
      position: absolute;
    }

    .pallet-card {
      background: rgba(255, 255, 255, 0.96);
      border: 1px solid #CBD5E1;
      border-radius: 0.75rem;
      box-shadow: 0 4px 14px rgba(15, 23, 42, 0.10);
      color: #0F172A;
      min-width: 0;
      overflow: auto;
      padding: 0.9rem;
      pointer-events: auto;
    }

    .pallet-card-title {
      font-size: 0.95rem;
      font-weight: 700;
      margin: 0 0 0.75rem;
    }

    .pallet-control {
      align-items: center;
      display: grid;
      gap: 0.4rem;
      grid-template-columns: minmax(5rem, auto) minmax(0, 1fr);
      margin: 0.55rem 0;
      pointer-events: auto;
    }

    .pallet-control > label {
      color: #475569;
      font-size: 0.85rem;
    }

    .pallet-control input,
    .pallet-control select,
    .pallet-control button {
      box-sizing: border-box;
      min-width: 0;
      width: 100%;
    }

    .pallet-control input[type="checkbox"] {
      justify-self: start;
      width: auto;
    }

    .pallet-status {
      --status-color: #2563EB;
      margin: 0.65rem 0;
    }

    .pallet-status-row {
      align-items: center;
      display: flex;
      gap: 0.55rem;
      justify-content: space-between;
    }

    .pallet-status-label {
      color: #475569;
      font-size: 0.84rem;
    }

    .pallet-status-value {
      color: #0F172A;
      font-weight: 700;
    }

    .pallet-status-badge,
    .pallet-status-alert {
      background: color-mix(in srgb, var(--status-color) 14%, white);
      border: 1px solid color-mix(in srgb, var(--status-color) 38%, white);
      border-radius: 999px;
      color: var(--status-color);
      display: inline-flex;
      font-size: 0.8rem;
      font-weight: 700;
      padding: 0.25rem 0.6rem;
    }

    .pallet-status-alert {
      border-radius: 0.5rem;
      box-sizing: border-box;
      display: block;
      padding: 0.65rem 0.75rem;
      width: 100%;
    }

    .pallet-status-led {
      background: var(--status-color);
      border-radius: 50%;
      box-shadow: 0 0 0.55rem var(--status-color);
      flex: 0 0 auto;
      height: 0.72rem;
      width: 0.72rem;
    }

    .pallet-status-kpi .pallet-status-value {
      color: var(--status-color);
      display: block;
      font-size: 1.8rem;
      line-height: 1.1;
      margin-top: 0.2rem;
    }

    .pallet-progress-track {
      background: #E2E8F0;
      border-radius: 999px;
      height: 0.7rem;
      margin-top: 0.4rem;
      overflow: hidden;
    }

    .pallet-progress-fill {
      background: var(--status-color);
      border-radius: inherit;
      height: 100%;
      transition: width 160ms ease;
    }

    .pallet-status-spinner {
      animation: pallet-spin 0.8s linear infinite;
      border: 3px solid #E2E8F0;
      border-radius: 50%;
      border-top-color: var(--status-color);
      height: 1rem;
      width: 1rem;
    }

    @keyframes pallet-spin {
      to { transform: rotate(360deg); }
    }

    .pallet-table-wrap {
      border: 1px solid #E2E8F0;
      border-radius: 0.5rem;
      max-width: 100%;
      overflow: auto;
    }

    .pallet-table {
      border-collapse: collapse;
      color: #0F172A;
      font-size: 0.86rem;
      width: 100%;
    }

    .pallet-table th,
    .pallet-table td {
      border-bottom: 1px solid #E2E8F0;
      padding: 0.48rem 0.6rem;
      text-align: left;
      white-space: nowrap;
    }

    .pallet-table th {
      background: #F8FAFC;
      color: #475569;
      font-weight: 700;
      position: sticky;
      top: 0;
      z-index: 1;
    }

    .pallet-table tbody tr:last-child td {
      border-bottom: 0;
    }

    .xterm-region {
      background: #020617;
      border: 1px solid #334155;
      box-sizing: border-box;
      overflow: hidden;
      pointer-events: auto;
      position: absolute;
    }

    .xterm-region .xterm {
      height: 100%;
    }
  </style>
</head>
<body>
  <header>
    <input id="url" value="ws://localhost:8080" aria-label="WebSocket URL" />
    <button id="connect">Connect</button>
    <select id="pageSelect" aria-label="Viewed page">
      <option value="">Start</option>
    </select>
    <button id="deletePage" disabled>Delete Page</button>
    <button id="clear">Clear</button>
    <span id="status">Disconnected</span>
  </header>

  <main>
    <canvas id="canvas"></canvas>
    <div id="chartLayer"></div>
    <div id="uiLayer"></div>
    <div id="terminalLayer"></div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/echarts@5.6.0/dist/echarts.min.js"></script>
  <script src="https://unpkg.com/@xterm/xterm@5.5.0/lib/xterm.js"></script>
  <script src="https://unpkg.com/@xterm/addon-fit@0.10.0/lib/addon-fit.js"></script>
  <script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    const chartLayer = document.getElementById("chartLayer");
    const terminalLayer = document.getElementById("terminalLayer");
    const uiLayer = document.getElementById("uiLayer");
    const urlInput = document.getElementById("url");
    const connectButton = document.getElementById("connect");
    const pageSelect = document.getElementById("pageSelect");
    const deletePageButton = document.getElementById("deletePage");
    const clearButton = document.getElementById("clear");
    const statusText = document.getElementById("status");

    let socket = null;
    let reconnectTimer = null;
    let shouldReconnect = false;
    let reconnectAttempts = 0;
    let drawingBuffer = [];
    let displayBuffer = drawingBuffer;
    let displayPageKey = null;
    const pageBuffers = new Map();
    const pageAliases = new Map([
      ["default", null],
      ["start", null],
      ["live", null],
      ["current", null],
      ["main", null],
      ["0", null]
    ]);
    let terminalRegions = new Map();
    let activeTerminalId = null;
    let xtermRegions = new Map();
    let uiGrids = new Map();
    let uiCards = new Map();
    let uiControls = new Map();
    let uiTables = new Map();
    let uiStatuses = new Map();
    let charts = new Map();
    const loadedScripts = new Map();
    const maxReconnectDelay = 10000;

    function resizeCanvas() {
      const dpr = window.devicePixelRatio || 1;
      const rect = canvas.getBoundingClientRect();
      canvas.width = Math.floor(rect.width * dpr);
      canvas.height = Math.floor(rect.height * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    function getCanvasStatus() {
      const rect = canvas.getBoundingClientRect();
      const mainRect = canvas.parentElement.getBoundingClientRect();
      return {
        type: "__pallet_status",
        canvas_width: canvas.width,
        canvas_height: canvas.height,
        css_width: Math.round(rect.width),
        css_height: Math.round(rect.height),
        device_pixel_ratio: window.devicePixelRatio || 1,
        max_css_width: Math.round(mainRect.width),
        max_css_height: Math.round(mainRect.height),
        screen_width: window.screen.width,
        screen_height: window.screen.height,
        screen_avail_width: window.screen.availWidth,
        screen_avail_height: window.screen.availHeight,
        echarts_version: window.echarts?.version || null
      };
    }

    function sendCanvasStatus() {
      if (!socket || socket.readyState !== WebSocket.OPEN) return;
      socket.send(JSON.stringify(getCanvasStatus()));
    }

    function clearCanvas(color = "white") {
      ctx.save();
      ctx.setTransform(1, 0, 0, 1, 0, 0);
      ctx.fillStyle = color;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.restore();
    }

    function resetTerminalRegions() {
      terminalRegions = new Map();
      resetXtermRegions();
      resetUiLayer();
      resetCharts();
    }

    function resetCharts() {
      for (const state of charts.values()) state.chart.dispose();
      charts = new Map();
      chartLayer.replaceChildren();
    }

    function resetUiLayer() {
      uiLayer.replaceChildren();
      uiGrids = new Map();
      uiCards = new Map();
      uiControls = new Map();
      uiTables = new Map();
      uiStatuses = new Map();
    }

    function resetXtermRegions() {
      for (const region of xtermRegions.values()) {
        region.dispose();
      }
      xtermRegions = new Map();
    }

    function normalizePageKey(value) {
      if (value === undefined || value === null || value === "") return null;
      return String(value);
    }

    function getCommandPageKey(command) {
      const key = normalizePageKey(command.page ?? command.palletPage);
      return pageAliases.has(key) ? pageAliases.get(key) : key;
    }

    function getNamedPageBuffer(pageKey) {
      if (!pageBuffers.has(pageKey)) {
        pageBuffers.set(pageKey, []);
        updatePageSelect();
      }
      return pageBuffers.get(pageKey);
    }

    function getPageBuffer(pageKey) {
      if (pageKey === null) return drawingBuffer;
      return getNamedPageBuffer(pageKey);
    }

    function isDisplayingPage(pageKey) {
      if (pageKey === null) return displayPageKey === null && displayBuffer === drawingBuffer;
      return displayBuffer === pageBuffers.get(pageKey);
    }

    function updatePageSelect() {
      const selectedValue = displayPageKey === null ? "" : displayPageKey;
      const existingValues = new Set(Array.from(pageSelect.options).map((option) => option.value));

      for (const option of Array.from(pageSelect.options)) {
        if (option.value !== "" && !pageBuffers.has(option.value)) {
          option.remove();
        }
      }

      for (const pageKey of pageBuffers.keys()) {
        if (existingValues.has(pageKey)) continue;
        const option = document.createElement("option");
        option.value = pageKey;
        option.textContent = `Page ${pageKey}`;
        pageSelect.appendChild(option);
      }

      pageSelect.value = selectedValue;
      deletePageButton.disabled = displayPageKey === null;
    }

    function rememberCommand(command, pageKey = null) {
      const targetBuffer = getPageBuffer(pageKey);
      const targetIsVisible = isDisplayingPage(pageKey);
      if (command.type === "clear") {
        if (pageKey === null) {
          drawingBuffer = [command];
          if (targetIsVisible) {
            displayBuffer = drawingBuffer;
            displayPageKey = null;
          }
        } else {
          targetBuffer.length = 0;
          targetBuffer.push(command);
        }
      } else {
        targetBuffer.push(command);
        if (pageKey === null && targetIsVisible) {
          displayBuffer = drawingBuffer;
          displayPageKey = null;
        }
      }
    }

    function replaceCommandGroup(command) {
      const pageKey = getCommandPageKey(command);
      const targetBuffer = getPageBuffer(pageKey);
      const targetIsVisible = isDisplayingPage(pageKey);
      const group = String(command.group || "");
      const replacementCommands = Array.isArray(command.commands) ? command.commands : [];
      if (!group) return;

      let insertAt = targetBuffer.length;
      for (let index = 0; index < targetBuffer.length; index += 1) {
        if (targetBuffer[index].group === group) {
          insertAt = index;
          break;
        }
      }

      const keptCommands = targetBuffer.filter((item) => item.group !== group);
      const normalizedCommands = replacementCommands.map((item) => {
        const next = { ...item, group };
        if (pageKey !== null && next.page === undefined && next.palletPage === undefined) {
          next.page = pageKey;
        }
        return next;
      });

      insertAt = Math.min(insertAt, keptCommands.length);
      targetBuffer.length = 0;
      targetBuffer.push(
        ...keptCommands.slice(0, insertAt),
        ...normalizedCommands,
        ...keptCommands.slice(insertAt)
      );

      if (targetIsVisible) {
        redrawDisplayBuffer();
      }
    }

    function redrawCommands(commands) {
      resetTerminalRegions();
      for (const command of commands) {
        drawCommand(command, false);
      }
    }

    function redrawDisplayBuffer() {
      clearCanvas("white");
      redrawCommands(displayBuffer);
    }

    function returnToStartPage() {
      displayBuffer = drawingBuffer;
      displayPageKey = null;
      clearCanvas("white");
      redrawCommands(displayBuffer);
      updatePageSelect();
    }

    function deleteNamedPage(pageKey) {
      pageKey = normalizePageKey(pageKey);
      if (pageKey === null || !pageBuffers.has(pageKey)) return;

      const deletedVisiblePage = displayPageKey === pageKey;
      pageBuffers.delete(pageKey);
      if (deletedVisiblePage) {
        returnToStartPage();
      } else {
        updatePageSelect();
      }
    }

    function showNamedPage(pageKey) {
      displayBuffer = getPageBuffer(pageKey);
      displayPageKey = pageKey;
      clearCanvas("white");
      redrawCommands(displayBuffer);
      updatePageSelect();
    }

    function showCommandPage(command) {
      const pageKey = getCommandPageKey(command);
      if (pageKey === null) {
        returnToStartPage();
      } else {
        showNamedPage(pageKey);
      }
    }

    function chartRegionStyle(element, command) {
      for (const name of ["x", "y", "width", "height"]) {
        if (command[name] == null) continue;
        const minimum = name === "width" || name === "height" ? 32 : 0;
        element.style[name === "x" ? "left" : name === "y" ? "top" : name] =
          `${Math.max(minimum, Math.round(command[name]))}px`;
      }
      if (command.z != null) element.style.zIndex = String(command.z);
      if (command.background) element.style.background = command.background;
      if (command.border === false) element.style.border = "0";
      else if (command.border) element.style.border = command.border;
      if (command.radius != null) element.style.borderRadius = `${Math.max(0, Math.round(command.radius))}px`;
      if (command.shadow === false) element.style.boxShadow = "none";
    }

    function defineChart(command) {
      if (!window.echarts) return console.error("ECharts is not loaded; cannot create chart", command.id);
      const id = String(command.id || "chart");
      const existing = charts.get(id);
      if (existing) {
        existing.chart.dispose();
        existing.region.remove();
      }
      const region = document.createElement("article");
      region.className = "chart-region";
      region.dataset.chartId = id;
      const cardId = command.card == null ? null : String(command.card);
      const card = cardId === null ? null : uiCards.get(cardId);
      if (cardId !== null && !card) {
        return console.warn(`Unknown card for chart ${id}:`, cardId);
      }
      if (card) region.classList.add("in-card");
      if (command.hidden === true) region.classList.add("hidden");
      if (command.titlebar || command.showTitlebar) region.classList.add("show-titlebar");
      chartRegionStyle(region, { x: 0, y: 0, width: 640, height: 360, ...command });
      const titlebar = document.createElement("div");
      titlebar.className = "chart-titlebar";
      titlebar.textContent = String(command.titlebar || command.title || id);
      const canvasHost = document.createElement("div");
      canvasHost.className = "chart-canvas";
      region.append(titlebar, canvasHost);
      (card ? card.body : chartLayer).appendChild(region);
      const chart = window.echarts.init(canvasHost, command.theme || null, {
        renderer: command.renderer || "canvas",
        useDirtyRect: command.useDirtyRect !== false
      });
      charts.set(id, { region, titlebar, canvasHost, chart });
      const eventNames = Array.isArray(command.events)
        ? command.events
        : ["click", "dblclick", "mouseover", "mouseout", "legendselectchanged", "datazoom"];
      for (const eventName of eventNames) {
        chart.on(eventName, (params) => {
          if (!socket || socket.readyState !== WebSocket.OPEN) return;
          socket.send(JSON.stringify({
            type: "__pallet_chart_event", id, event: eventName,
            ...(displayPageKey !== null ? { page: displayPageKey } : {}),
            name: params?.name, seriesName: params?.seriesName,
            seriesIndex: params?.seriesIndex, dataIndex: params?.dataIndex,
            value: params?.value, componentType: params?.componentType
          }));
        });
      }
      if (command.option) setChartOption(command);
      chart.resize();
    }

    function setChartOption(command) {
      const state = charts.get(String(command.id || "chart"));
      if (!state) return console.warn("Unknown chart:", command.id || "chart");
      state.chart.setOption(command.option || {}, {
        notMerge: command.notMerge === true || command.merge === false,
        lazyUpdate: command.lazyUpdate === true,
        replaceMerge: command.replaceMerge
      });
    }

    function setChartData(command, append = false) {
      const state = charts.get(String(command.id || "chart"));
      if (!state) return console.warn("Unknown chart:", command.id || "chart");
      const series = {};
      if (command.seriesId != null) series.id = command.seriesId;
      else if (command.seriesName != null) series.name = command.seriesName;
      else series.seriesIndex = Number(command.seriesIndex ?? 0);
      if (append) state.chart.appendData({ ...series, data: command.data || [] });
      else state.chart.setOption({ series: [{ ...series, data: command.data || [] }] }, { lazyUpdate: command.lazyUpdate === true });
    }

    function resizeChart(command) {
      const state = charts.get(String(command.id || "chart"));
      if (!state) return;
      chartRegionStyle(state.region, command);
      state.chart.resize();
    }

    function removeChart(command) {
      const id = String(command.id || "chart");
      const state = charts.get(id);
      if (!state) return;
      state.chart.dispose();
      state.region.remove();
      charts.delete(id);
    }

    function showHideChart(command, hidden) {
      const state = charts.get(String(command.id || "chart"));
      if (!state) return;
      state.region.classList.toggle("hidden", hidden);
      if (!hidden) requestAnimationFrame(() => state.chart.resize());
    }

    function loadChartScript(command) {
      const url = String(command.url || "");
      if (!url || loadedScripts.has(url)) return;
      const script = document.createElement("script");
      loadedScripts.set(url, script);
      script.src = url;
      script.async = true;
      script.onload = () => {
        if (socket?.readyState === WebSocket.OPEN) socket.send(JSON.stringify({ type: "__pallet_script_loaded", url }));
      };
      script.onerror = () => {
        if (socket?.readyState === WebSocket.OPEN) socket.send(JSON.stringify({ type: "__pallet_script_error", url }));
      };
      document.head.appendChild(script);
    }

    function drawCommand(command, remember = true) {
      const pageKey = getCommandPageKey(command);
      if (command.type === "__pallet_client_disconnected") {
        return;
      }

      if (command.type === "__pallet_show_page" || command.type === "page_show") {
        showCommandPage(command);
        return;
      }

      if (command.type === "__pallet_delete_page" || command.type === "page_delete") {
        deleteNamedPage(pageKey);
        return;
      }

      if (command.type === "__pallet_replace_group" || command.type === "group_replace") {
        replaceCommandGroup(command);
        return;
      }

      if (command.type === "script_load") {
        loadChartScript(command);
        return;
      }

      const targetIsVisible = isDisplayingPage(pageKey);
      if (remember) {
        rememberCommand(command, pageKey);
        if (!targetIsVisible) {
          return;
        }
      }

      switch (command.type) {
        case "clear": {
          resetTerminalRegions();
          clearCanvas(command.color || "white");
          break;
        }

        case "terminal_define": {
          defineTerminalRegion(command);
          break;
        }

        case "terminal_write": {
          writeTerminalRegion(command);
          break;
        }

        case "terminal_clear": {
          clearTerminalRegion(command);
          break;
        }

        case "terminal_xterm_define": {
          defineXtermRegion(command);
          break;
        }

        case "terminal_xterm_output": {
          writeXtermRegion(command);
          break;
        }

        case "terminal_xterm_clear": {
          clearXtermRegion(command);
          break;
        }

        case "ui_grid": {
          defineUiGrid(command);
          break;
        }

        case "ui_card": {
          defineUiCard(command);
          break;
        }

        case "ui_control": {
          defineUiControl(command);
          break;
        }

        case "ui_control_update": {
          updateUiControl(command);
          break;
        }

        case "ui_status": {
          defineUiStatus(command);
          break;
        }

        case "ui_status_update": {
          updateUiStatus(command);
          break;
        }

        case "ui_table": {
          defineUiTable(command);
          break;
        }

        case "ui_table_update": {
          updateUiTable(command);
          break;
        }

        case "chart_define":
        case "chart_create": {
          defineChart(command);
          break;
        }

        case "chart_option":
        case "chart_set_option": {
          setChartOption(command);
          break;
        }

        case "chart_data": {
          setChartData(command, command.append === true);
          break;
        }

        case "chart_append": {
          setChartData(command, true);
          break;
        }

        case "chart_resize":
        case "chart_move": {
          resizeChart(command);
          break;
        }

        case "chart_remove":
        case "chart_delete": {
          removeChart(command);
          break;
        }

        case "chart_show": {
          showHideChart(command, false);
          break;
        }

        case "chart_hide": {
          showHideChart(command, true);
          break;
        }

        case "line": {
          ctx.beginPath();
          ctx.moveTo(command.x1, command.y1);
          ctx.lineTo(command.x2, command.y2);
          ctx.strokeStyle = command.color || "black";
          ctx.lineWidth = command.width || 1;
          ctx.stroke();
          break;
        }

        case "rect": {
          ctx.beginPath();
          ctx.rect(command.x, command.y, command.width, command.height);
          if (command.fill) {
            ctx.fillStyle = command.fill;
            ctx.fill();
          }
          if (command.stroke !== false) {
            ctx.strokeStyle = command.color || "black";
            ctx.lineWidth = command.lineWidth || 1;
            ctx.stroke();
          }
          break;
        }

        case "circle": {
          ctx.beginPath();
          ctx.arc(command.x, command.y, command.radius, 0, Math.PI * 2);
          if (command.fill) {
            ctx.fillStyle = command.fill;
            ctx.fill();
          }
          if (command.stroke !== false) {
            ctx.strokeStyle = command.color || "black";
            ctx.lineWidth = command.lineWidth || 1;
            ctx.stroke();
          }
          break;
        }

        case "arc": {
          const start = Number(command.startAngle || 0) * Math.PI / 180;
          const end = Number(command.endAngle || 0) * Math.PI / 180;
          ctx.beginPath();
          ctx.arc(command.x, command.y, command.radius, start, end);
          ctx.strokeStyle = command.color || "black";
          ctx.lineWidth = command.width || 1;
          ctx.lineCap = command.lineCap || "round";
          ctx.stroke();
          ctx.lineCap = "butt";
          break;
        }

        case "text": {
          ctx.fillStyle = command.color || "black";
          ctx.font = command.font || "20px sans-serif";
          ctx.fillText(command.text || "", command.x, command.y);
          break;
        }

        case "path": {
          if (!Array.isArray(command.points) || command.points.length < 2) return;
          ctx.beginPath();
          ctx.moveTo(command.points[0].x, command.points[0].y);
          for (const point of command.points.slice(1)) {
            ctx.lineTo(point.x, point.y);
          }
          ctx.strokeStyle = command.color || "black";
          ctx.lineWidth = command.width || 1;
          ctx.lineCap = command.lineCap || "butt";
          ctx.lineJoin = command.lineJoin || "round";
          ctx.setLineDash(Array.isArray(command.dash) ? command.dash : []);
          ctx.stroke();
          ctx.setLineDash([]);
          ctx.lineCap = "butt";
          ctx.lineJoin = "miter";
          break;
        }

        default:
          console.warn("Unknown drawing command:", command);
      }
    }

    function uiParent(cardId, gridId) {

      const y = Math.round(command.y || 0);

      element.style.top = `${y}px`;
      element.style.width = command.width == null ? `calc(100% - ${x}px)` : `${Math.max(1, Math.round(command.width))}px`;
      element.style.height = command.height == null ? `calc(100% - ${y}px)` : `${Math.max(1, Math.round(command.height))}px`;
      element.style.gap = `${Math.max(0, Math.round(command.gap ?? 12))}px`;
      element.style.padding = `${Math.max(0, Math.round(command.padding ?? 12))}px`;

    function defineUiCard(command) {

      element.className = "pallet-card";
      element.dataset.palletCard = id;
      element.style.gridColumn = `span ${Math.max(1, Math.round(command.columnSpan || 1))}`;
      element.style.gridRow = `span ${Math.max(1, Math.round(command.rowSpan || 1))}`;
      if (command.background) element.style.background = command.background;
      if (command.color) element.style.color = command.color;
      if (command.border === false) element.style.border = "0";
      else if (command.border) element.style.borderColor = command.border;

      title.className = "pallet-card-title";
      title.textContent = String(command.title || "");
      title.hidden = !title.textContent;
      const body = document.createElement("div");
      body.className = "pallet-card-body";
      element.append(title, body);
      uiParent(null, command.grid || "default").appendChild(element);
      uiCards.set(id, { element, title, body });

    function controlValue(input, kind) {

    function sendUiEvent(id, eventName, value, details = {}) {

        type: "__pallet_ui_event",
        id: String(id),
        event: eventName,
        value,
        ...details

      socket.send(JSON.stringify(event));

    function defineUiControl(command) {

      const wrapper = document.createElement("div");
      wrapper.className = `pallet-control pallet-control-${kind}`;
      const label = document.createElement("label");
      label.textContent = String(command.label || "");
      label.htmlFor = `pallet-control-${id}`;
      label.hidden = !label.textContent || kind === "button";
      let input;
      if (kind === "button") {
        input = document.createElement("button");
        input.type = "button";
        input.textContent = String(command.label || command.text || id);
      } else if (kind === "select") {
        input = document.createElement("select");
        for (const optionValue of (command.options || [])) {
          const option = document.createElement("option");
          if (optionValue && typeof optionValue === "object") {
            option.value = String(optionValue.value ?? optionValue.label ?? "");
            option.textContent = String(optionValue.label ?? optionValue.value ?? "");
          } else {

            option.textContent = String(optionValue);
          }
          input.appendChild(option);
        }
      } else {
        input = document.createElement("input");
        input.type = kind === "toggle" ? "checkbox" : kind === "slider" ? "range" : kind === "number" ? "number" : "text";
      }

      input.disabled = command.disabled === true;
      if (command.placeholder != null) input.placeholder = String(command.placeholder);
      for (const name of ["min", "max", "step"]) {

      else if (kind !== "button" && command.value != null) input.value = String(command.value);

    function updateUiControl(command) {
      const control = uiControls.get(String(command.id || ""));

        control.label.hidden = !control.label.textContent || control.kind === "button";
        if (control.kind === "button") control.input.textContent = String(command.label);
      }
      if (command.disabled != null) control.input.disabled = command.disabled === true;
      if (command.value !== undefined) {
        if (control.kind === "toggle") control.input.checked = command.value === true;
        else if (control.kind !== "button") control.input.value = command.value == null ? "" : String(command.value);
      }
      for (const name of ["min", "max", "step", "placeholder"]) {
        if (command[name] != null) control.input[name] = command[name];
      }

    function statusColor(status, customColor) {
      if (customColor) return customColor;
      return {
        success: "#16A34A",
        warning: "#D97706",
        danger: "#DC2626",
        info: "#2563EB",
        neutral: "#64748B"
      }[String(status || "info")] || "#2563EB";
    }

    function defineUiStatus(command) {
      const id = String(command.id || "status");
      const existing = uiStatuses.get(id);

      root.className = "pallet-status";
      root.style.pointerEvents = "auto";
      uiParent(command.card, command.grid).appendChild(root);
      const state = { id, root, data: { ...command } };
      uiStatuses.set(id, state);
      renderUiStatus(state);
    }

    function updateUiStatus(command) {
      const state = uiStatuses.get(String(command.id || ""));
      if (!state) return;
      Object.assign(state.data, command);
      renderUiStatus(state);
    }

    function formatStatusValue(value, units = "") {
      if (value === undefined || value === null) return "";
      return `${value}${units || ""}`;
    }

    function renderUiStatus(state) {
      const data = state.data;
      const kind = String(data.kind || "badge").toLowerCase();
      const color = statusColor(data.status, data.color);
      state.root.className = `pallet-status pallet-status-${kind}`;
      state.root.style.setProperty("--status-color", color);
      state.root.replaceChildren();
      const label = document.createElement("span");
      label.className = "pallet-status-label";
      label.textContent = String(data.label || "");
      const value = document.createElement("span");
      value.className = "pallet-status-value";
      value.textContent = formatStatusValue(data.value ?? data.text, data.units);

      if (kind === "kpi") {
        state.root.append(label, value);
        return;
      }
      if (kind === "alert") {
        const alert = document.createElement("div");
        alert.className = "pallet-status-alert";
        alert.textContent = String(data.message ?? data.value ?? data.text ?? data.label ?? "");
        state.root.appendChild(alert);
        return;
      }
      const row = document.createElement("div");
      row.className = "pallet-status-row";
      row.appendChild(label);
      const indicator = document.createElement("div");
      indicator.className = "pallet-status-row";
      if (kind === "led") {
        const led = document.createElement("span");
        led.className = "pallet-status-led";
        if (data.active === false) {
          led.style.background = "#CBD5E1";
          led.style.boxShadow = "none";
        }
        indicator.append(led, value);
      } else if (kind === "spinner") {
        const spinner = document.createElement("span");
        spinner.className = "pallet-status-spinner";
        if (data.active === false) spinner.style.visibility = "hidden";
        indicator.append(spinner, value);
      } else if (kind === "badge") {
        value.className = "pallet-status-badge";
        indicator.appendChild(value);
      } else if (kind === "progress") {
        row.appendChild(value);
        const minimum = Number(data.min ?? 0);
        const maximum = Number(data.max ?? 100);
        const numericValue = Number(data.value ?? minimum);
        const percent = maximum === minimum ? 0 : Math.max(0, Math.min(100, (numericValue - minimum) / (maximum - minimum) * 100));
        const track = document.createElement("div");
        track.className = "pallet-progress-track";
        track.setAttribute("role", "progressbar");
        track.setAttribute("aria-valuemin", String(minimum));
        track.setAttribute("aria-valuemax", String(maximum));
        track.setAttribute("aria-valuenow", String(numericValue));
        const fill = document.createElement("div");
        fill.className = "pallet-progress-fill";
        fill.style.width = `${percent}%`;
        track.appendChild(fill);
        state.root.append(row, track);
        return;
      } else {
        indicator.appendChild(value);
      }
      row.appendChild(indicator);
      state.root.appendChild(row);
    }

    function normalizeTableColumns(columns) {
      return (columns || []).map((column) => {
        if (column && typeof column === "object") {

        }
        return { key: String(column), label: String(column), align: "left" };
      });

    function defineUiTable(command) {

      const title = document.createElement("h3");
      title.className = "pallet-card-title";
      title.textContent = String(command.title || "");
      title.hidden = !title.textContent;
      root.appendChild(title);
      let filter = null;
      if (command.filterable === true) {
        filter = document.createElement("input");
        filter.type = "search";
        filter.placeholder = String(command.filterPlaceholder || "Filter rows…");
        filter.style.boxSizing = "border-box";
        filter.style.marginBottom = "0.55rem";
        filter.style.width = "100%";

      }
      const wrap = document.createElement("div");
      wrap.className = "pallet-table-wrap";

      const table = document.createElement("table");
      table.className = "pallet-table";
      table.append(document.createElement("thead"), document.createElement("tbody"));
      wrap.appendChild(table);
      root.appendChild(wrap);
      uiParent(command.card, command.grid).appendChild(root);
      const state = {
        id,
        root,
        table,
        columns: normalizeTableColumns(command.columns),
        keyField: String(command.keyField || "id"),
        rows: new Map(),
        filter: "",
        sortKey: null,
        sortDirection: 1,
        selectable: command.selectable === true,

    function tableRowKey(state, row, fallback) {

    function setTableRows(state, rows) {

    function trimTableRows(state) {

    function updateUiTable(command) {

      else if (action === "remove") {

      } else if (action === "upsert") {

        rows.forEach((row, index) => state.rows.set(tableRowKey(state, row, state.rows.size + index), row || {}));

      for (const column of state.columns) {
        const th = document.createElement("th");
        th.textContent = column.label + (state.sortKey === column.key ? (state.sortDirection > 0 ? " ▲" : " ▼") : "");
        th.style.textAlign = column.align;

    function defineTerminalRegion(command) {
      const id = String(command.id || "default");
      const region = {
        id,
        x: Math.round(command.x || 0),
        y: Math.round(command.y || 0),
        width: Math.max(1, Math.round(command.width || 320)),
        height: Math.max(1, Math.round(command.height || 160)),
        background: command.background || "#020617",
        color: command.color || "#E5E7EB",
        border: command.border === false ? null : (command.border || "#334155"),
        title: command.title || "",
        titleColor: command.titleColor || command.color || "#E5E7EB",
        font: command.font || "14px ui-monospace, SFMono-Regular, Consolas, monospace",
        padding: Math.max(0, Math.round(command.padding ?? 8)),
        lineHeight: Math.max(8, Math.round(command.lineHeight || 18)),
        scrollback: Math.max(1, Math.round(command.scrollback || 1000)),
        scrollOffset: 0,
        scrollbarWidth: Math.max(8, Math.round(command.scrollbarWidth || 10)),
        clearButtonWidth: Math.max(44, Math.round(command.clearButtonWidth || 48)),
        interactive: command.interactive === true,
        inputPrompt: command.inputPrompt || "$ ",
        input: "",
        lines: []
      };

      renderTerminalRegion(region);

    function writeTerminalRegion(command) {
      const id = String(command.id || "default");
      const region = terminalRegions.get(id);
      if (!region) {
        console.warn("Unknown terminal region:", id);
        return;
      }

      const text = String(command.text ?? "");
      const color = command.color || region.color;
      const chunks = text.split(/\r\n|\n|\r/);
      chunks.forEach((chunk, index) => {
        if (index > 0) {
          region.lines.push({ text: "", color });
        }

        if (region.lines.length === 0) {
          region.lines.push({ text: "", color });
        }

        if (chunk) {
          appendWrappedTerminalText(region, chunk, color);
        }
      });

      if (command.newline === true && !text.match(/(\r\n|\n|\r)$/)) {
        region.lines.push({ text: "", color });
      }

      trimTerminalScrollback(region);
      clampTerminalScroll(region);
      renderTerminalRegion(region);
    }

    function appendWrappedTerminalText(region, text, color) {
      ctx.save();
      ctx.font = region.font;
      const maxWidth = Math.max(1, region.width - region.padding * 2 - region.scrollbarWidth - 4);
      let current = region.lines[region.lines.length - 1];
      current.color = current.text ? current.color : color;

      for (const char of text) {
        const nextText = current.text + char;
        if (current.text && ctx.measureText(nextText).width > maxWidth) {
          current = { text: char, color };
          region.lines.push(current);
        } else {
          current.text = nextText;
        }
      }
      ctx.restore();
    }

    function trimTerminalScrollback(region) {
      if (region.lines.length > region.scrollback) {
        region.lines = region.lines.slice(region.lines.length - region.scrollback);
      }
    }

    function getTerminalVisibleLineCount(region) {
      const titleOffset = getTerminalHeaderOffset(region);
      const inputOffset = region.interactive ? region.lineHeight + 2 : 0;
      return Math.max(0, Math.floor((region.height - region.padding * 2 - titleOffset - inputOffset) / region.lineHeight));
    }

    function getTerminalHeaderOffset(region) {
      return region.lineHeight + 4;
    }

    function clampTerminalScroll(region) {
      const maxVisibleLines = getTerminalVisibleLineCount(region);
      const maxOffset = Math.max(0, region.lines.length - maxVisibleLines);
      region.scrollOffset = Math.max(0, Math.min(region.scrollOffset || 0, maxOffset));

    function getTerminalAtPoint(x, y) {
      const regions = Array.from(terminalRegions.values()).reverse();
      return regions.find((region) =>
        x >= region.x &&
        x <= region.x + region.width &&
        y >= region.y &&
        y <= region.y + region.height

    function scrollTerminalRegion(region, deltaY) {

    function sendTerminalInput(region) {

        type: "__pallet_terminal_input",
        id: region.id,
        text: region.input

      if (displayPageKey !== null) event.page = displayPageKey;
      socket.send(JSON.stringify(event));

    function getTerminalClearButtonBounds(region) {
      const buttonHeight = Math.max(16, region.lineHeight);
      return {
        x: region.x + region.width - region.padding - region.scrollbarWidth - 8 - region.clearButtonWidth,
        y: region.y + region.padding,
        width: region.clearButtonWidth,
        height: buttonHeight

    function pointInRect(x, y, rect) {

    function clearTerminalRegion(command) {
      const id = String(command.id || "default");
      const region = terminalRegions.get(id);

      renderTerminalRegion(region);

    function renderTerminalRegion(region) {
      ctx.save();
      ctx.fillStyle = region.background;

        ctx.strokeStyle = region.border;

      ctx.font = region.font;
      ctx.textBaseline = "top";
      const titleOffset = getTerminalHeaderOffset(region);
      const clearButton = getTerminalClearButtonBounds(region);

      if (region.title) {
        ctx.fillStyle = region.titleColor;
        ctx.fillText(region.title, region.x + region.padding, region.y + region.padding);
      }

      renderTerminalClearButton(region, clearButton);

      ctx.strokeStyle = region.border || "#334155";
      ctx.beginPath();
      ctx.moveTo(region.x + region.padding, region.y + region.padding + region.lineHeight + 1);
      ctx.lineTo(Math.max(region.x + region.padding, clearButton.x - 8), region.y + region.padding + region.lineHeight + 1);
      ctx.stroke();

      const textX = region.x + region.padding;
      const textY = region.y + region.padding + titleOffset;
      const maxVisibleLines = getTerminalVisibleLineCount(region);
      clampTerminalScroll(region);

      const end = Math.max(0, region.lines.length - region.scrollOffset);
      const start = Math.max(0, end - maxVisibleLines);
      const visible = region.lines.slice(start, end);

      for (let index = 0; index < visible.length; index += 1) {
        const line = visible[index];
        ctx.fillStyle = line.color || region.color;
        ctx.fillText(line.text, textX, textY + index * region.lineHeight);
      }

      renderTerminalScrollbar(region, maxVisibleLines);
      renderTerminalInput(region);

      ctx.restore();
    }

    function renderTerminalClearButton(region, bounds) {
      ctx.fillStyle = "rgba(15, 23, 42, 0.78)";
      ctx.fillRect(bounds.x, bounds.y, bounds.width, bounds.height);
      ctx.strokeStyle = region.border || "#334155";
      ctx.strokeRect(bounds.x + 0.5, bounds.y + 0.5, bounds.width - 1, bounds.height - 1);
      ctx.fillStyle = region.titleColor || region.color;
      ctx.textAlign = "center";
      ctx.fillText("Clear", bounds.x + bounds.width / 2, bounds.y + Math.max(1, (bounds.height - region.lineHeight) / 2));
      ctx.textAlign = "start";
    }

    function renderTerminalInput(region) {
      if (!region.interactive) return;

      const y = region.y + region.height - region.padding - region.lineHeight;
      const maxTextWidth = Math.max(1, region.width - region.padding * 2 - region.scrollbarWidth - 4);
      const prompt = region.inputPrompt || "$ ";
      const text = prompt + region.input + (activeTerminalId === region.id ? "_" : "");

      ctx.strokeStyle = region.border || "#334155";
      ctx.beginPath();
      ctx.moveTo(region.x + region.padding, y - 3);
      ctx.lineTo(region.x + region.width - region.padding - region.scrollbarWidth - 4, y - 3);
      ctx.stroke();

      ctx.save();
      ctx.beginPath();
      ctx.rect(region.x + region.padding, y, maxTextWidth, region.lineHeight);
      ctx.clip();
      ctx.fillStyle = activeTerminalId === region.id ? "#f8fafc" : region.color;
      ctx.fillText(text, region.x + region.padding, y);
      ctx.restore();
    }

    function renderTerminalScrollbar(region, maxVisibleLines) {
      if (region.lines.length <= maxVisibleLines || maxVisibleLines <= 0) return;

      const trackX = region.x + region.width - region.padding - region.scrollbarWidth;
      const trackY = region.y + region.padding + getTerminalHeaderOffset(region);
      const inputOffset = region.interactive ? region.lineHeight + 2 : 0;
      const trackHeight = Math.max(1, region.height - region.padding * 2 - getTerminalHeaderOffset(region) - inputOffset);
      const maxOffset = Math.max(1, region.lines.length - maxVisibleLines);
      const thumbHeight = Math.max(18, Math.round(trackHeight * (maxVisibleLines / region.lines.length)));
      const thumbRange = Math.max(0, trackHeight - thumbHeight);
      const fromTop = maxOffset - region.scrollOffset;
      const thumbY = trackY + Math.round((fromTop / maxOffset) * thumbRange);

      ctx.fillStyle = "rgba(148, 163, 184, 0.22)";
      ctx.fillRect(trackX, trackY, region.scrollbarWidth, trackHeight);
      ctx.fillStyle = "rgba(226, 232, 240, 0.72)";
      ctx.fillRect(trackX, thumbY, region.scrollbarWidth, thumbHeight);
    }

    function defineXtermRegion(command) {
      if (!window.Terminal) {
        console.error("xterm.js is not loaded; cannot create terminal_xterm region");
        return;
      }

      const id = String(command.id || "default");
      const existing = xtermRegions.get(id);
      if (existing) {
        existing.dispose();
      }

      const x = Math.round(command.x || 0);
      const y = Math.round(command.y || 0);
      const width = Math.max(1, Math.round(command.width || 640));
      const height = Math.max(1, Math.round(command.height || 360));
      const fontSize = Math.max(8, Math.round(command.fontSize || 14));
      const lineHeight = Number(command.lineHeight || 1.15);
      const charWidth = Math.max(6, Math.round(fontSize * 0.62));
      const rowHeight = Math.max(10, Math.round(fontSize * lineHeight));
      let cols = Math.max(2, Math.floor((width - 12) / charWidth));
      let rows = Math.max(2, Math.floor((height - 12) / rowHeight));

      const element = document.createElement("div");
      element.className = "xterm-region";
      element.style.left = `${x}px`;
      element.style.top = `${y}px`;
      element.style.width = `${width}px`;
      element.style.height = `${height}px`;
      element.style.background = command.background || "#020617";
      element.style.borderColor = command.border === false ? "transparent" : (command.border || "#334155");
      terminalLayer.appendChild(element);

      const terminal = new window.Terminal({
        cols,
        rows,
        cursorBlink: true,
        convertEol: false,
        fontFamily: "ui-monospace, SFMono-Regular, Consolas, monospace",
        fontSize,
        lineHeight,
        scrollback: Math.max(0, Math.round(command.scrollback || 1000)),
        theme: {
          background: command.background || "#020617",
          foreground: command.color || "#E5E7EB",
          cursor: command.cursor || "#f8fafc"
        }
      });
      terminal.open(element);
      let fitAddon = null;
      if (window.FitAddon) {
        fitAddon = new window.FitAddon.FitAddon();
        terminal.loadAddon(fitAddon);
        fitAddon.fit();
        cols = terminal.cols;
        rows = terminal.rows;
      }
      terminal.focus();

      terminal.onData((data) => {
        if (!socket || socket.readyState !== WebSocket.OPEN) return;
        socket.send(JSON.stringify({
          type: "__pallet_xterm_input",
          id,
          data,
          ...(displayPageKey !== null ? { page: displayPageKey } : {})
        }));
      });

      const region = {
        id,
        element,
        terminal,
        fitAddon,
        x,
        y,
        width,
        height,
        cols,
        rows,
        dispose() {
          terminal.dispose();
          element.remove();
        }
      };
      xtermRegions.set(id, region);
      sendXtermResize(region);
    }

    function writeXtermRegion(command) {
      const id = String(command.id || "default");
      const region = xtermRegions.get(id);
      if (!region) return;
      region.terminal.write(String(command.data ?? ""));
    }

    function clearXtermRegion(command) {
      const id = String(command.id || "default");
      const region = xtermRegions.get(id);
      if (!region) return;
      region.terminal.clear();
    }

    function sendXtermResize(region) {
      if (!socket || socket.readyState !== WebSocket.OPEN) return;
      const event = {
        type: "__pallet_xterm_resize",
        id: region.id,
        cols: region.cols,
        rows: region.rows
      };
      if (displayPageKey !== null) event.page = displayPageKey;
      socket.send(JSON.stringify(event));
    }

    function fitXtermRegions() {
      for (const region of xtermRegions.values()) {
        if (!region.fitAddon) continue;
        region.fitAddon.fit();
        if (region.cols !== region.terminal.cols || region.rows !== region.terminal.rows) {
          region.cols = region.terminal.cols;
          region.rows = region.terminal.rows;
          sendXtermResize(region);
        }
      }
    }

    function handleMessage(event) {
      try {
        const message = JSON.parse(event.data);

        // Accept either one command or an array of commands.
        const commands = Array.isArray(message) ? message : [message];
        for (const command of commands) {
          drawCommand(command);
        }
      } catch (error) {
        console.error("Invalid JSON drawing message:", event.data, error);
      }
    }

    function scheduleReconnect() {
      if (!shouldReconnect || reconnectTimer) return;

      const delay = Math.min(1000 * 2 ** reconnectAttempts, maxReconnectDelay);
      reconnectAttempts += 1;
      statusText.textContent = `Reconnecting in ${Math.round(delay / 1000)}s...`;

      reconnectTimer = window.setTimeout(() => {
        reconnectTimer = null;
        connectSocket();
      }, delay);
    }

    function stopReconnect() {
      shouldReconnect = false;
      reconnectAttempts = 0;

      if (reconnectTimer) {
        window.clearTimeout(reconnectTimer);
        reconnectTimer = null;
      }
    }

    function connectSocket() {
      if (socket) return;

      socket = new WebSocket(urlInput.value);
      statusText.textContent = "Connecting...";
      connectButton.textContent = "Disconnect";

      socket.addEventListener("open", () => {
        statusText.textContent = "Connected";
        reconnectAttempts = 0;
        sendCanvasStatus();
      });

      socket.addEventListener("message", handleMessage);

      socket.addEventListener("close", () => {
        socket = null;

        if (shouldReconnect) {
          scheduleReconnect();
        } else {
          statusText.textContent = "Disconnected";
          connectButton.textContent = "Connect";
        }
      });

      socket.addEventListener("error", () => {
        statusText.textContent = shouldReconnect ? "Connection error. Retrying..." : "Connection error";
      });
    }

    function connect() {
      if (shouldReconnect) {
        stopReconnect();

        if (socket) {
          socket.close();
        } else {
          statusText.textContent = "Disconnected";
          connectButton.textContent = "Connect";
        }

        return;
      }

      shouldReconnect = true;
      reconnectAttempts = 0;

      if (socket) {
        socket.close();
        socket = null;
      }

      connectSocket();
    }

    connectButton.addEventListener("click", connect);
    pageSelect.addEventListener("change", () => {
      const pageKey = normalizePageKey(pageSelect.value);
      if (pageKey === null) {
        returnToStartPage();
      } else {
        showNamedPage(pageKey);
      }
    });
    deletePageButton.addEventListener("click", () => {
      deleteNamedPage(displayPageKey);
    });
    clearButton.addEventListener("click", () => drawCommand({
      type: "clear",
      color: "white",
      ...(displayPageKey !== null ? { page: displayPageKey } : {})
    }));
    canvas.addEventListener("wheel", (event) => {
      const rect = canvas.getBoundingClientRect();
      const region = getTerminalAtPoint(event.clientX - rect.left, event.clientY - rect.top);
      if (!region) return;

      event.preventDefault();
      scrollTerminalRegion(region, event.deltaY);
    }, { passive: false });
    canvas.addEventListener("click", (event) => {
      const rect = canvas.getBoundingClientRect();
      const x = event.clientX - rect.left;
      const y = event.clientY - rect.top;
      const region = getTerminalAtPoint(x, y);
      if (!region) {
        activeTerminalId = null;
        redrawDisplayBuffer();
        return;
      }

      if (pointInRect(x, y, getTerminalClearButtonBounds(region))) {
        drawCommand({
          type: "terminal_clear",
          id: region.id,
          ...(displayPageKey !== null ? { page: displayPageKey } : {})
        });
        return;
      }

      if (region.interactive) {
        activeTerminalId = region.id;
        canvas.focus();
        renderTerminalRegion(region);
      }
    });
    canvas.tabIndex = 0;
    canvas.addEventListener("keydown", (event) => {
      if (!activeTerminalId) return;
      const region = terminalRegions.get(activeTerminalId);
      if (!region || !region.interactive) return;

      if (event.key === "Enter") {
        event.preventDefault();
        sendTerminalInput(region);
        region.input = "";
        region.scrollOffset = 0;
        renderTerminalRegion(region);
        return;
      }

      if (event.key === "Backspace") {
        event.preventDefault();
        region.input = region.input.slice(0, -1);
        renderTerminalRegion(region);
        return;
      }

      if (event.key === "Escape") {
        event.preventDefault();
        region.input = "";
        renderTerminalRegion(region);
        return;
      }

      if (event.key.length === 1 && !event.ctrlKey && !event.metaKey && !event.altKey) {
        event.preventDefault();
        region.input += event.key;
        renderTerminalRegion(region);
      }
    });
    window.addEventListener("resize", () => {
      resizeCanvas();
      redrawDisplayBuffer();
      fitXtermRegions();
      sendCanvasStatus();
    });

    resizeCanvas();
    drawCommand({ type: "clear", color: "white" });
  </script>
</body>
</html>
